name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Easypanel deploy
        run: |
          curl -s -X GET "${{ secrets.EASYPANEL_DEPLOY_WEBHOOK }}" \
            --max-time 30 \
            --fail \
            && echo "Deploy triggered successfully" \
            || echo "Deploy trigger failed"
 
