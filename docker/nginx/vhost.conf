# www.carbeat.online → carbeat.online
server {
    listen 80;
    server_name www.carbeat.online;
    return 301 https://carbeat.online$request_uri;
}

# www.carbeat.uno → carbeat.uno
server {
    listen 80;
    server_name www.carbeat.uno;
    return 301 https://carbeat.uno$request_uri;
}

# www.flox.city → flox.city
server {
    listen 80;
    server_name www.flox.city;
    return 301 https://flox.city$request_uri;
}

# Main application — all Carbeat and FloxCity domains
server {
    listen 80 default_server;

    server_name carbeat.online carbeat.uno flox.city _;

    root "/app/public";
    index index.php;

    client_max_body_size 50m;

    access_log   /docker.stdout;
    error_log    /docker.stderr warn;

    location ~* \.(jpg|jpeg|png|gif|css|js|ico|webp|ttf|woff|woff2|svg|eot|otf)$ {
        try_files $uri =404;
        access_log off;
        expires 30d;
    }

    # Socket.IO — proxied from all domains via /socket.io/ path.
    # The upstream name is the EasyPanel internal service hostname.
    location /socket.io/ {
        proxy_pass http://carbeat_online_carbeat_socketio:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
        gzip_static on;
    }

    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME     $request_filename;
        fastcgi_read_timeout 600;
    }
}
